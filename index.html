<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentoro | Live Monitoring</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .msg-anim { animation: fadeInUp 0.3s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col font-sans">

    <nav class="bg-white border-b p-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-2">
            <div class="bg-blue-600 p-2 rounded text-white"><i class="fas fa-robot"></i></div>
            <span class="font-bold text-slate-800 uppercase tracking-tighter">Agentoro Live Sync</span>
        </div>
        <div id="status" class="text-[10px] font-bold px-3 py-1 rounded-full bg-slate-100 text-slate-500">INITIALIZING...</div>
    </nav>

    <main class="flex-1 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-xl rounded-3xl shadow-xl border border-slate-200 flex flex-col h-[550px] overflow-hidden">
            <div id="chat-content" class="flex-1 overflow-y-auto p-6 space-y-4">
                <div class="h-full flex flex-col items-center justify-center text-slate-400">
                    <i class="fas fa-sync fa-spin text-3xl mb-2"></i>
                    <p class="text-xs italic">Awaiting messages from VPS (POST -> GET)...</p>
                </div>
            </div>
            <div class="p-4 bg-slate-50 border-t text-[9px] text-center text-slate-400 font-bold uppercase">
                Direct Sync via 161.97.177.100:5000
            </div>
        </div>
    </main>

    <script>
        const VPS_URL = "http://161.97.177.100:5000/messages";
        // استخدام AllOrigins كجسر HTTPS آمن
        const PROXY = `https://api.allorigins.win/get?url=${encodeURIComponent(VPS_URL)}&callback=?`;

        async function fetchMessages() {
            try {
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(VPS_URL + '?t=' + Date.now())}`);
                const data = await res.json();
                const messages = JSON.parse(data.contents);

                if (messages && messages.length > 0) {
                    renderMessages(messages);
                    document.getElementById('status').innerHTML = "LIVE: SYNCED";
                    document.getElementById('status').className = "text-[10px] font-bold px-3 py-1 rounded-full bg-green-100 text-green-600";
                }
            } catch (e) {
                console.log("Polling...");
            }
        }

        function renderMessages(msgs) {
            const container = document.getElementById('chat-content');
            container.innerHTML = '';
            msgs.slice(-5).forEach(m => {
                container.innerHTML += `
                    <div class="msg-anim flex flex-col items-start">
                        <div class="bg-slate-100 text-slate-700 px-4 py-2 rounded-2xl rounded-bl-none text-sm shadow-sm border border-slate-200">
                            ${m.user_text}
                        </div>
                    </div>
                    <div class="msg-anim flex flex-col items-end mt-1">
                        <div class="bg-blue-600 text-white px-4 py-2 rounded-2xl rounded-br-none text-sm shadow-md font-medium">
                            ${m.ai_response}
                        </div>
                    </div>
                `;
            });
            container.scrollTop = container.scrollHeight;
        }

        setInterval(fetchMessages, 3000);
    </script>
</body>
</html>
